# .readthedocs.yaml

# Read the Docs configuration: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

# Build HTML docs
sphinx:
  configuration: docs/conf.py
  fail_on_warning: false   # Set to true once docs are stable

# Install dependencies
python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .          # installs pyfvtool itself (needed for autodoc)
      extra_requirements:
        - docs
